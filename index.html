<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>周易占事 · 梅花易数</title>
<style>
  :root {
    --bg: #0a0a12;
    --card: #12121e;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dark: #8a6e2e;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --red: #c94c4c;
    --green: #4c8a5c;
    --border: rgba(201,168,76,0.2);
    --shadow: rgba(0,0,0,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", serif;
    overflow-x: hidden;
  }

  /* 背景装饰 */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 90%, rgba(100,60,160,0.04) 0%, transparent 70%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* 头部 */
  header {
    text-align: center;
    padding: 30px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  header .title {
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
    margin-bottom: 6px;
  }
  header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
  }
  header .bagua {
    font-size: 36px;
    margin-top: 12px;
    opacity: 0.6;
    letter-spacing: 0.3em;
  }

  /* 步骤条 */
  .steps-bar {
    display: flex; justify-content: center; align-items: center;
    gap: 0; margin-bottom: 28px;
  }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--card); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text-dim);
    transition: all 0.4s ease;
  }
  .step-dot.active {
    background: var(--gold); border-color: var(--gold);
    color: #000; font-weight: bold;
    box-shadow: 0 0 10px rgba(201,168,76,0.5);
  }
  .step-dot.done {
    background: rgba(201,168,76,0.2); border-color: var(--gold);
    color: var(--gold);
  }
  .step-line {
    width: 36px; height: 1.5px;
    background: var(--border);
    transition: background 0.4s;
  }
  .step-line.done { background: var(--gold); }

  /* 页面卡片 */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px var(--shadow);
  }

  /* 标题样式 */
  .section-title {
    font-size: 18px; color: var(--gold);
    text-align: center; margin-bottom: 16px;
    letter-spacing: 0.1em;
    position: relative;
  }
  .section-title::before,
  .section-title::after {
    content: '◆'; font-size: 8px;
    vertical-align: middle; margin: 0 8px;
    opacity: 0.5;
  }

  .instruction {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 24px;
  }

  /* 卦符展示 */
  .hexagram-display {
    display: flex; justify-content: center; align-items: center;
    gap: 16px; margin: 20px 0;
    padding: 20px;
    background: rgba(201,168,76,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .hexagram-stack {
    text-align: center;
  }
  .hexagram-name {
    font-size: 22px; color: var(--gold);
    margin-bottom: 6px; font-weight: bold;
    letter-spacing: 0.1em;
  }
  .hexagram-id {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 8px;
  }
  .hexagram-symbols {
    display: flex; flex-direction: column; gap: 1px;
  }
  .yao-line {
    width: 56px; height: 7px; border-radius: 2px;
    transition: background 0.3s;
  }
  .yao-yang {
    background: var(--gold);
    box-shadow: 0 0 4px rgba(201,168,76,0.4);
  }
  .yao-yin {
    background: transparent;
    border: 2px solid var(--gold-dark);
    box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
  }
  .yao-line.dong { box-shadow: 0 0 8px var(--gold-light), 0 0 16px rgba(232,201,106,0.4); }
  .arrow-symbol {
    font-size: 28px; color: var(--gold);
    opacity: 0.5;
  }
  .hexagram-meta {
    font-size: 12px; color: var(--text-dim);
    margin-top: 8px;
  }

  /* 爻图 */
  .yao-table {
    width: 100%; border-collapse: collapse;
    margin: 12px 0;
  }
  .yao-table td {
    padding: 6px 10px; font-size: 13px;
    text-align: center;
  }
  .yao-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .yao-pos { color: var(--text-dim); width: 36%; }
  .yao-type { color: var(--gold); font-size: 12px; }
  .yao-dong { color: var(--red); font-size: 11px; }

  /* 数字输入 */
  .number-input-area {
    display: flex; flex-direction: column; align-items: center;
    gap: 16px; margin: 20px 0;
  }
  .number-input {
    width: 160px; height: 64px;
    font-size: 28px; text-align: center;
    background: rgba(201,168,76,0.06);
    border: 1.5px solid var(--gold-dark);
    border-radius: 12px;
    color: var(--gold);
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 0.2em;
  }
  .number-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }
  .number-input::placeholder { color: rgba(201,168,76,0.3); font-size: 14px; }
  .hint-text {
    font-size: 12px; color: var(--text-dim);
    text-align: center; line-height: 1.6;
    max-width: 280px;
  }

  /* 按钮 */
  .btn {
    display: block; width: 100%; max-width: 280px;
    margin: 16px auto 0;
    padding: 14px 24px;
    font-size: 16px; font-family: inherit;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #0a0a12; font-weight: bold;
    border: none; border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.3s ease;
    box-shadow: 0 2px 12px rgba(201,168,76,0.3);
  }
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(201,168,76,0.5);
  }
  .btn:active { transform: translateY(0); }
  .btn:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--gold-dark);
    color: var(--gold);
    box-shadow: none;
    margin-top: 10px;
  }
  .btn-outline:hover {
    background: rgba(201,168,76,0.08);
    box-shadow: none;
  }

  /* 结果分析区块 */
  .result-section {
    margin-bottom: 20px;
  }
  .result-label {
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 0.15em; margin-bottom: 6px;
    text-transform: uppercase;
  }
  .result-value {
    font-size: 15px; color: var(--text);
    line-height: 1.8;
  }
  .result-value.gold { color: var(--gold); font-size: 18px; }
  .result-value.red { color: var(--red); }
  .result-value.green { color: var(--green); }
  .result-divider {
    border: none; border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* 吉凶标签 */
  .ausp-badge {
    display: inline-block; padding: 4px 14px;
    border-radius: 20px; font-size: 13px;
    font-weight: bold; letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .ausp-great { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid var(--gold); }
  .ausp-good { background: rgba(76,138,92,0.15); color: var(--green); border: 1px solid var(--green); }
  .ausp-neutral { background: rgba(180,160,120,0.12); color: #b4a078; border: 1px solid #b4a078; }
  .ausp-bad { background: rgba(201,76,76,0.12); color: var(--red); border: 1px solid var(--red); }

  /* 概率条 */
  .prob-bar-wrap {
    margin: 10px 0 14px;
  }
  .prob-bar-bg {
    width: 100%; height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden;
    margin-bottom: 6px;
  }
  .prob-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 1s ease;
  }
  .prob-bar-fill.great { background: linear-gradient(90deg, var(--gold-dark), var(--gold)); }
  .prob-bar-fill.good { background: linear-gradient(90deg, #2a6b3a, var(--green)); }
  .prob-bar-fill.neutral { background: linear-gradient(90deg, #7a6a4a, #b4a078); }
  .prob-bar-fill.bad { background: linear-gradient(90deg, #8a3a3a, var(--red)); }
  .prob-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-dim);
  }

  /* 列表项 */
  .list-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 14px; line-height: 1.7;
  }
  .list-item:last-child { border-bottom: none; }
  .list-icon { margin-right: 6px; }

  /* 行动建议 */
  .advice-item {
    background: rgba(201,168,76,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-size: 14px; line-height: 1.7;
  }
  .advice-num {
    display: inline-block; width: 20px; height: 20px;
    background: var(--gold); color: #000;
    border-radius: 50%; font-size: 11px;
    text-align: center; line-height: 20px;
    font-weight: bold; margin-right: 8px;
    vertical-align: middle;
  }

  /* 卦辞 */
  .guaci-block {
    background: rgba(201,168,76,0.04);
    border-left: 3px solid var(--gold);
    padding: 14px 16px;
    border-radius: 0 10px 10px 0;
    margin: 10px 0;
  }
  .guaci-original {
    color: var(--gold); font-size: 15px;
    margin-bottom: 8px;
    font-style: italic;
  }
  .guaci-modern {
    font-size: 13px; color: var(--text-dim);
    line-height: 1.8;
  }

  /* 总结 */
  .summary-box {
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    margin: 16px 0;
  }
  .summary-box .big-text {
    font-size: 16px; color: var(--text);
    line-height: 1.9;
  }

  /* 底部免责声明 */
  .disclaimer {
    text-align: center;
    font-size: 11px; color: rgba(138,128,112,0.5);
    margin-top: 30px;
    line-height: 1.6;
    padding: 0 10px;
  }

  /* 底部导航 */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,10,18,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex; justify-content: center; gap: 12px;
  }
  .nav-btn {
    padding: 8px 20px; font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent; color: var(--text-dim);
    cursor: pointer; font-family: inherit;
    transition: all 0.3s;
    letter-spacing: 0.1em;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .nav-btn.primary {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold-dark);
    color: var(--gold);
  }
  .nav-btn.primary:hover { background: rgba(201,168,76,0.2); }

  /* 八卦符号 */
  .bagua-sym { font-size: 20px; margin-right: 4px; }

  /* 历史记录 */
  .history-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.3s;
  }
  .history-item:hover { border-color: var(--gold-dark); }
  .history-title { font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .history-meta { font-size: 11px; color: var(--text-dim); }
  .history-hexas { font-size: 12px; color: var(--gold); margin-top: 4px; }

  /* 动画 */
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .shimmer { background: linear-gradient(90deg, transparent, rgba(201,168,76,0.1), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }

  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 10px rgba(201,168,76,0.3); }
    50% { box-shadow: 0 0 24px rgba(201,168,76,0.6); }
  }
  .pulse { animation: pulse-gold 2s infinite; }

  /* 加载动画 */
  .loading-dots { text-align: center; padding: 20px; }
  .loading-dots span {
    display: inline-block; width: 8px; height: 8px;
    background: var(--gold); border-radius: 50%;
    margin: 0 4px;
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

  /* 移动端安全区 */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    body { padding-bottom: env(safe-area-inset-bottom); }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ========== 头部 ========== -->
  <header>
    <div class="title">周 易 占 事</div>
    <div class="subtitle">梅花易数 · 起卦问事</div>
    <div class="bagua">☰ ☱ ☲ ☳ ☴ ☵ ☶ ☷</div>
  </header>

  <!-- ========== 步骤指示器 ========== -->
  <div class="steps-bar" id="stepsBar">
    <div class="step-dot active" id="s1">①</div>
    <div class="step-line" id="l1"></div>
    <div class="step-dot" id="s2">②</div>
    <div class="step-line" id="l2"></div>
    <div class="step-dot" id="s3">③</div>
  </div>

  <!-- ========== 页面1：输入事项 ========== -->
  <div class="page active" id="page1">
    <div class="card">
      <div class="section-title">静心 · 问事</div>
      <div class="instruction">
        请在心中默念您想占卜的事情，<br>待心中专注、念头清明后，<br>随意说出一个 1~99 之间的整数。
      </div>
      <textarea id="matterInput" rows="3" placeholder="例如：我想知道工会技能大赛的结果如何……"
        style="width:100%;background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:10px;
               padding:12px 14px;font-size:14px;color:#e8e0d0;font-family:inherit;resize:none;outline:none;
               line-height:1.7;box-sizing:border-box;transition:border-color 0.3s;"></textarea>
    </div>
    <div class="card">
      <div class="section-title">随意报数</div>
      <div class="number-input-area">
        <input type="number" id="numberInput" class="number-input"
          placeholder="报个数" min="1" max="99">
        <div class="hint-text">
          随意一个数字即可（1~99），<br>不必刻意，不必犹豫，心诚则灵。
        </div>
      </div>
    </div>
    <button class="btn pulse" onclick="startDivination()">🔮 起 卦</button>
    <button class="btn btn-outline" onclick="showHistory()" style="max-width:280px;margin:10px auto 0;display:block;">
      📜 查看历史
    </button>
  </div>

  <!-- ========== 页面2：占卜中（加载动画） ========== -->
  <div class="page" id="page2">
    <div class="card" style="text-align:center;padding:40px 20px;">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <div style="color:var(--gold);font-size:16px;margin-top:12px;letter-spacing:0.15em;">起卦中……</div>
      <div style="color:var(--text-dim);font-size:13px;margin-top:8px;">心诚则灵，天机已动</div>
    </div>
  </div>

  <!-- ========== 页面3：卦象总览 ========== -->
  <div class="page" id="page3">
    <div class="card">
      <div class="section-title">卦 象 总 览</div>
      <div id="hexaDisplay" class="hexagram-display"></div>
    </div>
    <div class="card">
      <div class="result-label">世 应 格 局</div>
      <table class="yao-table" id="yaoTable"></table>
      <hr class="result-divider">
      <div class="result-value" id="shiyInfo"></div>
    </div>
  </div>

  <!-- ========== 页面4：吉凶判断 ========== -->
  <div class="page" id="page4">
    <div class="card">
      <div class="section-title">吉 凶 判 断</div>
      <div style="text-align:center;">
        <span class="ausp-badge" id="auspBadge"></span>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-bar-bg">
          <div class="prob-bar-fill" id="probBar"></div>
        </div>
        <div class="prob-labels">
          <span>失败</span><span id="probText">成功率 0%</span><span>成功</span>
        </div>
      </div>
      <hr class="result-divider">
      <div class="result-label">有利因素</div>
      <div id="prosList"></div>
      <hr class="result-divider">
      <div class="result-label">不利因素</div>
      <div id="consList"></div>
    </div>
  </div>

  <!-- ========== 页面5：时机与建议 ========== -->
  <div class="page" id="page5">
    <div class="card">
      <div class="section-title">时 机 分 析</div>
      <div class="result-label">当前时机</div>
      <div class="result-value" id="timingResult" style="font-size:16px;margin-bottom:12px;"></div>
      <div class="result-label">最佳行动时段</div>
      <div class="result-value" id="timingDetail"></div>
    </div>
    <div class="card">
      <div class="section-title">行 动 建 议</div>
      <div id="adviceList"></div>
    </div>
  </div>

  <!-- ========== 页面6：卦辞启示 ========== -->
  <div class="page" id="page6">
    <div class="card">
      <div class="section-title">主 卦 卦 辞</div>
      <div class="guaci-block">
        <div class="guaci-original" id="mainGuaciOrig"></div>
        <div class="guaci-modern" id="mainGuaciMod"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">变 卦 卦 辞</div>
      <div class="guaci-block">
        <div class="guaci-original" id="changeGuaciOrig"></div>
        <div class="guaci-modern" id="changeGuaciMod"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">一 句 话 总 结</div>
      <div class="summary-box">
        <div class="big-text" id="summaryText"></div>
      </div>
    </div>
  </div>

  <!-- ========== 历史记录页 ========== -->
  <div class="page" id="pageHistory">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="section-title" style="margin:0;">历 史 记 录</div>
        <button onclick="clearHistory()" style="background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit;">清空</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="disclaimer">
    本工具仅供娱乐参考，周易智慧在于启发思考，辅助决策而非决定命运。<br>
    尽人事，听天命。
  </div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav" id="bottomNav" style="display:none;">
  <button class="nav-btn" id="prevBtn" onclick="prevPage()">← 上一步</button>
  <button class="nav-btn primary" id="nextBtn" onclick="nextPage()">下一步 →</button>
  <button class="nav-btn" id="replayBtn" onclick="replay()" style="display:none;">重新起卦</button>
</div>

<script>

// ═══════════════════════════════════════════════════════
// 核心算法
// ═══════════════════════════════════════════════════════
function calcHexagram(userNum) {
  const now = new Date();
  const H = now.getHours();
  let upper = (userNum + H) % 8; upper = upper || 8;
  let lower = (userNum * 2 + H) % 8; lower = lower || 8;
  let mainId = (upper - 1) * 8 + lower;
  let dongYao = (userNum + H) % 6 + 1;

  // 二进制翻爻（从上爻到初爻 = 高3位到低3位）
  let binVal = 0;
  for (let i = 0; i < 6; i++) {
    let guaIdx = i < 3 ? upper - 1 : lower - 1;
    let yaoIdx = i < 3 ? 2 - i : 5 - i;
    let isYang = ((guaIdx >> yaoIdx) & 1) === 1;
    binVal = (binVal << 1) | (isYang ? 1 : 0);
  }
  // binVal 高3位=上卦，低3位=下卦（从初爻到上爻排列）
  // 转为从上爻到初爻的二进制：上爻=bit5, 初爻=bit0
  // 原始：初爻=bit0(LSB)...上爻=bit5(MSB)
  // 恒卦：震☳(110)在上卦=bits5-3=110, 巽☴(010)在下卦=bits2-0=010 -> bin=110010=50
  // 动爻位置：dongYao=3(1-based) -> bit2翻转
  let flipBit = 1 << (dongYao - 1);
  let newBin = binVal ^ flipBit;
  let newUpper = (newBin >> 3) & 0x7; newUpper = newUpper || 8;
  let newLower = newBin & 0x7; newLower = newLower || 8;
  let changeId = (newUpper - 1) * 8 + newLower;

  return { upper, lower, mainId, dongYao, changeId };
}

// ═══════════════════════════════════════════════════════
// 六爻生成（从上爻到初爻）
// ═══════════════════════════════════════════════════════
function genHexagramLines(upperId, lowerId) {
  const lines = [];
  for (let i = 0; i < 3; i++) {
    let yaoIdx = 2 - i; // 2,1,0
    let isYang = ((upperId - 1) >> yaoIdx & 1) === 1;
    lines.push(isYang);
  }
  for (let i = 0; i < 3; i++) {
    let yaoIdx = 2 - i;
    let isYang = ((lowerId - 1) >> yaoIdx & 1) === 1;
    lines.push(isYang);
  }
  return lines; // [上爻, 五爻, 四爻, 三爻, 二爻, 初爻]
}

function genChangeLines(upperId, lowerId, dongYao) {
  const lines = genHexagramLines(upperId, lowerId);
  lines[dongYao - 1] = !lines[dongYao - 1];
  return lines;
}

  } else if (["4","5","7","8","10","13","15","17","19","25","26","27","30","31","32","34","35","40","41","43","45","46","48","49","50","53","58","60","61"].includes(String(main))) {
    baseProb = Math.max(baseProb, 65);
    factors.pros.push("主卦为吉卦");
  } else if (["6","28","29","36","39","44","47","54","62"].includes(String(main))) {
    baseProb = Math.min(baseProb, 38);
    factors.cons.push("主卦含小凶之象");
  } else if (["23"].includes(String(main))) {
    baseProb = Math.min(baseProb, 20);
    factors.cons.push("主卦为大凶卦");
  }

  // 动爻位置影响
  if (dongYao <= 2) { factors.pros.push("动爻在低位，事情尚在初期，变数较小"); }
  if (dongYao === 3) { factors.pros.push("动爻在中位，事情进展中段，影响中等"); }
  if (dongYao === 4) { factors.cons.push("动爻在四爻，关键门槛，谨防变故"); }
  if (dongYao === 5) { factors.cons.push("动爻在五爻，决策核心，影响重大"); }
  if (dongYao === 6) { factors.cons.push("动爻在上爻，事情已近尾声，变化最难挽回"); }

  // 变卦影响
  const changeHex = getHexagram(change);
  if (changeHex) {
    if (["1","11","14","24","42","55"].includes(String(change))) {
      factors.pros.push("变卦为大吉卦，事情有转机");
    } else if (["4","5","7","8","10","13","15","17","19","25","26","27","30","31","32","34","35","40","41","43","45","46","48","49","50","53","58","60","61"].includes(String(change))) {
      factors.pros.push("变卦为吉卦，局势向好");
    }
    if (["6","28","29","36","39","47","54","62"].includes(String(change))) {
      factors.cons.push("变卦含凶象，需警惕局势恶化");
    }
  }

  // 五行时令（简化）
  let wxProb = 0;
  const isSpring = month >= 2 && month <= 4;
  const isSummer = month >= 5 && month <= 7;
  const isAutumn = month >= 8 && month <= 10;
  const isWinter = month >= 11 || month <= 1;

  if ([1,2].includes(upper) || [1,2].includes(lower)) { // 金
    if (isAutumn) { wxProb = 8; factors.pros.push("金卦得秋令，时令相生"); }
    else { wxProb = -5; factors.cons.push("金卦失令，略显不利"); }
  }
  if ([4,5].includes(upper) || [4,5].includes(lower)) { // 木
    if (isSpring) { wxProb = 8; factors.pros.push("木卦得春令，时令相生"); }
    else { wxProb = -5; factors.cons.push("木卦失令，略显不利"); }
  }
  if ([3].includes(upper) || [3].includes(lower)) { // 火
    if (isSummer) { wxProb = 8; factors.pros.push("火卦得夏令，时令相生"); }
    else { wxProb = -5; factors.cons.push("火卦失令，略显不利"); }
  }
  if ([6].includes(upper) || [6].includes(lower)) { // 水
    if (isWinter) { wxProb = 8; factors.pros.push("水卦得冬令，时令相生"); }
    else { wxProb = -5; factors.cons.push("水卦失令，略显不利"); }
  }
  if ([7,8].includes(upper) || [7,8].includes(lower)) { // 土
    if (isSummer || isAutumn) { wxProb = 6; factors.pros.push("土卦得令，略有助益"); }
  }

  let finalProb = Math.min(95, Math.max(8, baseProb + wxProb));
  if (finalProb >= 78) return { badge: "大吉", prob: finalProb, factors, timing: "积极行动", timingDetail: "时机有利，宜全力以赴" };
  if (finalProb >= 60) return { badge: "吉", prob: finalProb, factors, timing: "适合行动", timingDetail: "时机尚可，稳中求进" };
  if (finalProb >= 40) return { badge: "平", prob: finalProb, factors, timing: "观望等待", timingDetail: "时机一般，不宜冒进" };
  if (finalProb >= 25) return { badge: "小凶", prob: finalProb, factors, timing: "暂缓行动", timingDetail: "时机不利，建议延后" };
  return { badge: "大凶", prob: finalProb, factors, timing: "谨慎行事", timingDetail: "风险较高，三思而后行" };
}

// ═══════════════════════════════════════════════════════
// 行动建议生成
// ═══════════════════════════════════════════════════════
function genAdvice(main, change, dongYao) {
  const advices = [];
  const hex = getHexagram(main);
  const changeHex = getHexagram(change);
  if (!hex) return advices;

  advices.push({ title: "顺势而为", text: hex.pros.split("/")[0] + "的方向，契合卦象本义，宜顺势推进。" });

  if (dongYao <= 3) {
    advices.push({ title: "稳扎稳打", text: "动爻在三爻以下，事情尚在初期/中期，不必急躁，按部就班推进即可。" });
  } else {
    advices.push({ title: "蓄势待发", text: "动爻在四爻以上，事情已至关键阶段，蓄势等待时机成熟再行动。" });
  }

  if (changeHex && changeHex.id !== main) {
    advices.push({ title: "关注变化", text: `主卦向变卦演变：变卦「${changeHex.name}」暗示事情将有转变，需留意新趋势。` });
  }

  if (["大吉","吉"].includes(hex.ausp)) {
    advices.push({ title: "积极进取", text: "卦象显示有利，宜积极行动、把握机会，不必过度保守。" });
  } else if (["小凶","大凶"].includes(hex.ausp)) {
    advices.push({ title: "谨慎防范", text: "卦象显示风险，需做好预案，谨慎行事，忌盲目冒进。" });
  } else {
    advices.push({ title: "中道而行", text: "卦象显示中性，成败更多取决于人的主观努力，尽力而为便好。" });
  }

  return advices;
}

// ═══════════════════════════════════════════════════════
// 渲染函数
// ═══════════════════════════════════════════════════════
function renderHexagram(id, dongIdx) {
  const h = getHexagram(id);
  if (!h) return "";
  const lines = genHexagramLines(h.upper, h.lower);
  let html = `<div class="hexagram-stack">`;
  html += `<div class="hexagram-name">${h.name}为${h.gua.length === 4 ? "卦" : ""}</div>`;
  html += `<div class="hexagram-id">第${h.id}卦</div>`;
  html += `<div class="hexagram-symbols">`;
  for (let i = 0; i < 6; i++) {
    let cls = lines[i] ? "yao-yang" : "yao-yin";
    if (i === dongIdx - 1) cls += " dong";
    html += `<div class="yao-line ${cls}"></div>`;
  }
  html += `</div>`;
  html += `<div class="hexagram-meta">${BAGUA[h.upper-1].sym} ${BAGUA[h.upper-1].wx} · ${BAGUA[h.lower-1].sym} ${BAGUA[h.lower-1].wx}</div>`;
  html += `</div>`;
  return html;
}

function renderHexaDisplay(mainId, changeId, dongYao) {
  const el = document.getElementById("hexaDisplay");
  el.innerHTML = renderHexagram(mainId, dongYao) +
    `<div class="arrow-symbol">→</div>` +
    renderHexagram(changeId, null);
}

function renderYaoTable(mainId, dongYao) {
  const h = getHexagram(mainId);
  if (!h) return;
  const lines = genHexagramLines(h.upper, h.lower);
  const shiIdx = 4, yingIdx = 1;

  let html = "";
  for (let i = 0; i < 6; i++) {
    let isYang = lines[i];
    let isShi = (i === shiIdx);
    let isYing = (i === yingIdx);
    let isDong = (i === dongYao - 1);
    let label = getLiuQin(i);
    let mark = "";
    if (isShi) mark = "<span style='color:var(--gold)'>【世】</span>";
    if (isYing) mark = "<span style='color:#8a8070'>【应】</span>";
    if (isDong) mark += "<span style='color:var(--red)'> ✦动</span>";
    html += `<tr>
      <td class="yao-pos">${POS_NAMES[i]}</td>
      <td class="yao-type">${isYang ? "━━ 阳" : "━ ━ 阴"}</td>
      <td>${label}${mark}</td>
    </tr>`;
  }
  document.getElementById("yaoTable").innerHTML = html;
  document.getElementById("shiyInfo").innerHTML =
    `<strong style="color:var(--gold)">世爻</strong>在第${shiIdx+1}爻（${getLiuQin(shiIdx)}），代表您（主动方）。<br>
     <strong style="color:#8a8070">应爻</strong>在第${yingIdx+1}爻（${getLiuQin(yingIdx)}），代表外部环境/对方。<br>
     <br>${dongYao <= 3 ? "动爻在低位，事情尚在初期/中期，变数相对可控。" :
      dongYao === 4 ? "动爻在四爻，事情接近关键门槛，须特别注意。" :
      "动爻在中上位，事情已至核心阶段，影响较大。"}`;
}

function renderResult(ausp) {
  const badge = document.getElementById("auspBadge");
  badge.textContent = "【" + ausp.badge + "】";
  badge.className = "ausp-badge " + (
    ausp.badge === "大吉" ? "ausp-great" :
    ausp.badge === "吉" ? "ausp-good" :
    ausp.badge === "平" ? "ausp-neutral" :
    "ausp-bad"
  );

  const bar = document.getElementById("probBar");
  bar.style.width = "0%";
  setTimeout(() => {
    bar.style.width = ausp.prob + "%";
    bar.className = "prob-bar-fill " + (
      ausp.prob >= 70 ? "great" :
      ausp.prob >= 55 ? "good" :
      ausp.prob >= 40 ? "neutral" : "bad"
    );
  }, 100);
  document.getElementById("probText").textContent = "成功率约 " + ausp.prob + "%";

  let prosHtml = "", consHtml = "";
  (ausp.factors.pros || []).forEach(p => {
    prosHtml += `<div class="list-item"><span class="list-icon" style="color:var(--green)">✅</span>${p}</div>`;
  });
  (ausp.factors.cons || []).forEach(c => {
    consHtml += `<div class="list-item"><span class="list-icon" style="color:var(--red)">⚠️</span>${c}</div>`;
  });
  if (!prosHtml) prosHtml = '<div class="list-item" style="color:var(--text-dim)">暂无明显不利因素</div>';
  if (!consHtml) consHtml = '<div class="list-item" style="color:var(--text-dim)">暂无明显不利因素</div>';
  document.getElementById("prosList").innerHTML = prosHtml;
  document.getElementById("consList").innerHTML = consHtml;
}

function renderTiming(ausp) {
  document.getElementById("timingResult").innerHTML =
    `<span style="color:${ausp.badge==="大吉"||ausp.badge==="吉"?"var(--green)":ausp.badge==="平"?"#b4a078":"var(--red)"}">${ausp.timing}</span>`;
  document.getElementById("timingDetail").innerHTML = `
    <div class="result-value">${ausp.timingDetail}</div>
    <div style="margin-top:8px;font-size:13px;color:var(--text-dim)">
      ${new Date().getMonth()>=2&&new Date().getMonth()<=4?"🌸 当前春末，木气旺盛，利木卦":"<br>"}
      建议选择上午（7-11时）行动，此时精力充沛、思维清晰。
    </div>`;
}

function renderAdvice(main, change, dongYao) {
  const advices = genAdvice(main, change, dongYao);
  let html = "";
  advices.forEach((a, i) => {
    html += `<div class="advice-item"><span class="advice-num">${i+1}</span><strong>${a.title}</strong><br>${a.text}</div>`;
  });
  document.getElementById("adviceList").innerHTML = html;
}

function renderGuaci(main, change) {
  const h = getHexagram(main);
  const c = getHexagram(change);
  if (!h) return;
  document.getElementById("mainGuaciOrig").textContent = "「" + h.ci + "」";
  document.getElementById("mainGuaciMod").textContent = h.jie;
  if (c) {
    document.getElementById("changeGuaciOrig").textContent = "「" + c.ci + "」";
    document.getElementById("changeGuaciMod").textContent = c.jie;
  }
}

function renderSummary(main, change, dongYao, matter, prob) {
  const h = getHexagram(main);
  const c = getHexagram(change);
  const probLabel = prob >= 70 ? "成功可期" : prob >= 50 ? "有望成功" : prob >= 35 ? "需要努力" : "风险较大";
  let text = "";
  if (prob >= 70) {
    text = `「${matter}」得${h ? h.name : ""}之象，${probLabel}，变卦${c ? c.name : ""}暗示变化趋势。`;
  } else if (prob >= 40) {
    text = `「${matter}」呈${h ? h.name : ""}之象，${probLabel}，关键在于自身努力与把握时机。`;
  } else {
    text = `「${matter}」现${h ? h.name : ""}之象，${probLabel}，建议谨慎行事，做好风险预案。`;
  }
  text += " 尽人事，听天命，尽力而为便无遗憾。";
  document.getElementById("summaryText").textContent = text;
}

// ═══════════════════════════════════════════════════════
// 步骤导航
// ═══════════════════════════════════════════════════════
function updateStepBar(step) {
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById("s" + i);
    const line = document.getElementById("l" + (i - 1));
    if (dot) {
      dot.className = "step-dot" +
        (i < step ? " done" : "") +
        (i === step ? " active" : "");
    }
    if (line && i > 1) {
      line.className = "step-line" + (i - 1 <= step - 1 ? " done" : "");
    }
  }
}

function showPage(num) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const pageEl = document.getElementById("page" + num);
  if (pageEl) pageEl.classList.add("active");
  updateStepBar(num);
  state.currentStep = num;

  const nav = document.getElementById("bottomNav");
  nav.style.display = "flex";
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const replayBtn = document.getElementById("replayBtn");

  prevBtn.style.display = num > 1 && num < 7 ? "inline-block" : "none";
  if (num >= 3 && num <= 5) {
    nextBtn.style.display = "inline-block";
    replayBtn.style.display = "none";
  } else if (num === 6) {
    nextBtn.style.display = "none";
    replayBtn.style.display = "inline-block";
    prevBtn.style.display = "none";
  } else {
    nextBtn.style.display = "none";
    replayBtn.style.display = "none";
  }
}

function nextPage() {
  const next = state.currentStep + 1;
  if (next <= 6) showPage(next);
}

function prevPage() {
  const prev = state.currentStep - 1;
  if (prev >= 1) showPage(prev);
}

function replay() {
  showPage(1);
  document.getElementById("numberInput").value = "";
  document.getElementById("matterInput").value = "";
  document.getElementById("bottomNav").style.display = "none";
}

// ═══════════════════════════════════════════════════════
// 主流程
// ═══════════════════════════════════════════════════════
function startDivination() {
  const matter = document.getElementById("matterInput").value.trim();
  const numStr = document.getElementById("numberInput").value.trim();
  const num = parseInt(numStr);

  if (!numStr || isNaN(num) || num < 1 || num > 99) {
    alert("请输入 1~99 之间的整数");
    return;
  }

  state.matter = matter || "某事";
  state.number = num;

  // 计算卦象
  const calc = calcHexagram(num);
  state.upper = calc.upper;
  state.lower = calc.lower;
  state.mainId = calc.mainId;
  state.dongYao = calc.dongYao;
  state.changeId = calc.changeId;

  // 判断吉凶
  state.result = judgeAuspice(state.mainId, state.changeId, state.dongYao, state.upper, state.lower);

  // 保存历史
  saveToHistory();

  // 渲染第3页（卦象）
  renderHexaDisplay(state.mainId, state.changeId, state.dongYao);
  renderYaoTable(state.mainId, state.dongYao);

  // 显示加载动画，然后到结果页
  showPage(2);
  setTimeout(() => {
    showPage(3);
    setTimeout(() => {
      renderResult(state.result);
      showPage(4);
      setTimeout(() => {
        renderTiming(state.result);
        renderAdvice(state.mainId, state.changeId, state.dongYao);
        showPage(5);
        setTimeout(() => {
          renderGuaci(state.mainId, state.changeId);
          renderSummary(state.mainId, state.changeId, state.dongYao, state.matter, state.result.prob);
          showPage(6);
        }, 300);
      }, 300);
    }, 300);
  }, 1200);
}

// ═══════════════════════════════════════════════════════
// 历史记录
// ═══════════════════════════════════════════════════════
function getHistory() {
  try { return JSON.parse(localStorage.getItem("iching_history") || "[]"); }
  catch { return []; }
}

function saveToHistory() {
  const h = getHexagram(state.mainId);
  const c = getHexagram(state.changeId);
  const record = {
    id: Date.now(),
    matter: state.matter,
    num: state.number,
    main: state.mainId,
    mainName: h ? h.name : "?",
    change: state.changeId,
    changeName: c ? c.name : "?",
    dongYao: state.dongYao,
    badge: state.result.badge,
    prob: state.result.prob,
    time: new Date().toLocaleString("zh-CN")
  };
  let hist = getHistory();
  hist.unshift(record);
  hist = hist.slice(0, 20);
  localStorage.setItem("iching_history", JSON.stringify(hist));
}

function showHistory() {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("pageHistory").classList.add("active");
  document.getElementById("bottomNav").style.display = "flex";
  document.getElementById("prevBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("replayBtn").style.display = "none";

  const hist = getHistory();
  if (hist.length === 0) {
    document.getElementById("historyList").innerHTML =
      '<div style="text-align:center;color:var(--text-dim);padding:20px;font-size:14px;">暂无历史记录</div>';
    return;
  }
  let html = "";
  hist.forEach(r => {
    const badgeColor = r.badge==="大吉"||r.badge==="吉"?"var(--green)":r.badge==="平"?"#b4a078":"var(--red)";
    html += `<div class="history-item" onclick="loadHistory(${r.id})">
      <div class="history-title">${r.matter}</div>
      <div class="history-meta">${r.time} · 报数 ${r.num}</div>
      <div class="history-hexas">${r.mainName} → ${r.changeName} · <span style="color:${badgeColor}">${r.badge}</span> ${r.prob}%</div>
    </div>`;
  });
  document.getElementById("historyList").innerHTML = html;
}

function loadHistory(id) {
  const hist = getHistory();
  const r = hist.find(h => h.id === id);
  if (!r) return;

  state.matter = r.matter;
  state.number = r.num;
  state.mainId = r.main;
  state.changeId = r.change;
  state.dongYao = r.dongYao;
  state.result = judgeAuspice(r.main, r.change, r.dongYao,
    getHexagram(r.main).upper, getHexagram(r.main).lower);

  renderHexaDisplay(state.mainId, state.changeId, state.dongYao);
  renderYaoTable(state.mainId, state.dongYao);
  renderResult(state.result);
  renderTiming(state.result);
  renderAdvice(state.mainId, state.changeId, state.dongYao);
  renderGuaci(state.mainId, state.changeId);
  renderSummary(state.mainId, state.changeId, state.dongYao, state.matter, state.result.prob);

  showPage(6);
}

function clearHistory() {
  if (confirm("确定清空所有历史记录？")) {
    localStorage.removeItem("iching_history");
    showHistory();
  }
}

// 初始化
document.getElementById("bottomNav").style.display = "none";
</script>
